env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Android Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Fix gradlew
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Inject API secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> gradle.properties
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> gradle.properties
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> gradle.properties
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> gradle.properties
          echo "GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}" >> gradle.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug
