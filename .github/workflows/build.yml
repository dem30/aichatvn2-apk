name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix gradlew
      run: |
        chmod +x gradlew
        # Đảm bảo gradle-wrapper.properties trỏ đúng phiên bản
        # Nếu vẫn lỗi, bước này đảm bảo quyền thực thi được cấp lại

    - name: Build Debug APK
      # Thay vì dùng 'gradle', chúng ta gọi './gradlew'
      # Nó sẽ tự đọc file 'gradle/wrapper/gradle-wrapper.properties'
      # để tải đúng phiên bản Gradle dự án bạn cần
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
