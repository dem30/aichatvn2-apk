name: Android Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew   # Fix vấn đề 2
        run: chmod +x gradlew

      - name: Create local.properties                # Fix thiếu sdk.dir
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Inject API secrets                     # Fix vấn đề 1
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> gradle.properties
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> gradle.properties
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> gradle.properties
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> gradle.properties
          echo "GMAIL_SENDER=${{ secrets.GMAIL_SENDER }}" >> gradle.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> gradle.properties

      - name: Build Debug APK
        run: bash gradlew assembleDebug
